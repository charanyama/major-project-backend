server:
  port: 8007

spring:
  application:
    name: notification-service

  datasource:
    url: ${DB_URI}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        type.json_format_mapper: jackson 

  # ---- Mail (SMTP) -------------------------------------------------------
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  # ---- Thymeleaf ----------------------------------------------------------
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false   # set true in production

# ---- Notification-service own config ------------------------------------
notification:
  mail:
    from: ${MAIL_FROM:no-reply@virtualstore.com}
    from-name: ${MAIL_FROM_NAME:VirtualStore}

# ---- Twilio -------------------------------------------------------------
# twilio:
#   account-sid: ${TWILIO_ACCOUNT_SID}
#   auth-token:  ${TWILIO_AUTH_TOKEN}
#   from-number: ${TWILIO_FROM_NUMBER}

# ---- Actuator -----------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.virtualstore.notification_service: INFO
    org.springframework.mail: WARN