# Application
spring.application.name=Indexing Service
server.port=8083

# Pinecone
spring.ai.virtualstore.pinecone.api-key=${PINECONE_API_KEY}
spring.ai.virtualstore.pinecone.host=${PINECONE_HOST}
spring.ai.virtualstore.pinecone.index-name=products-index

# Product service endpoint
external.product-api=http://localhost:8080/products

# Kafka
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=indexing-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.virtualstore.indexingservice.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.virtualstore.indexingservice.event.ProductEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Logging
logging.level.org.apache.kafka.clients.NetworkClient=ERROR
logging.level.org.apache.kafka.clients.Metadata=ERROR