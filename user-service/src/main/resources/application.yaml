server:
    port: 8002

spring:
    application:
        name: user-service

    # PostgreSQL / Supabase connection
    datasource:
        url: ${DATABASE_URI}
        username: ${DATABASE_USER}
        password: ${DATABASE_PASSWORD}
        driver-class-name: org.postgresql.Driver

        hikari:
            maximum-pool-size: 3
            minimum-idle: 1
            connection-timeout: 10000
            idle-timeout: 60000 # Close after 1 minute
            max-lifetime: 300000 # Reconnect every 5 minutes
            connection-test-query: "SELECT 1"
            validation-timeout: 5000
            leak-detection-threshold: 60000

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                "[format_sql]": true
                jdbc:
                    lob:
                        "[non_contextual_creation]": true

    web:
        error:
            include-message: always
            include-binding-errors: always

    mail:
        host: smtp.gmail.com
        port: 587
        username: ${MAIL_USERNAME}
        password: ${MAIL_PASSWORD}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true

logging:
    level:
        root: INFO
        "[com.virtualstore]": DEBUG
        "[org.hibernate.SQL]": DEBUG
        "[org.hibernate.type.descriptor.sql.BasicBinder]": TRACE

management:
    endpoints:
        web:
            exposure:
                include: "health,info,metrics"
    endpoint:
        health:
            show-details: always

app:
    frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}
    password-reset-expiry-ms: ${PASSWORD_RESET_EXPIRY_MS:3600000}
    email-verification-expiry-ms: ${EMAIL_VERIFICATION_EXPIRY_MS:86400000}
    mail:
        from: ${APP_MAIL_FROM:${MAIL_USERNAME:no-reply@virtualstore.com}}
        from-name: ${APP_MAIL_FROM_NAME:Virtual Store}

jwt:
    secret: ${JWT_SECRET}
