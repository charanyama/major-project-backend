<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify your email</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f6f7fb; padding: 24px; color: #1f2937;">
    <div style="max-width: 640px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 32px;">
        <h1 style="margin-top: 0;">Confirm your email address</h1>
        <p>Hello <span th:text="${fullName}">there</span>,</p>
        <p>Thanks for registering. Please verify your email address to activate your account.</p>
        <p style="margin: 32px 0;">
            <a th:href="${verificationUrl}"
               style="display: inline-block; background: #0f766e; color: #ffffff; text-decoration: none; padding: 12px 20px; border-radius: 8px;">
                Verify email
            </a>
        </p>
        <p>This link expires in <span th:text="${expiryHours}">24</span> hour(s).</p>
        <p>If the button does not work, copy and paste this URL into your browser:</p>
        <p th:text="${verificationUrl}">https://example.com/verify-email</p>
    </div>
</body>
</html>
