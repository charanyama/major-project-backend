<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset your password</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f6f7fb; padding: 24px; color: #1f2937;">
    <div style="max-width: 640px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 32px;">
        <h1 style="margin-top: 0;">Reset your password</h1>
        <p>Hello <span th:text="${firstName}">there</span>,</p>
        <p>We received a request to reset your password.</p>
        <p style="margin: 32px 0;">
            <a th:href="${resetUrl}"
               style="display: inline-block; background: #1d4ed8; color: #ffffff; text-decoration: none; padding: 12px 20px; border-radius: 8px;">
                Reset password
            </a>
        </p>
        <p>This link expires in <span th:text="${expiryHours}">1</span> hour(s).</p>
        <p>If the button does not work, copy and paste this URL into your browser:</p>
        <p th:text="${resetUrl}">https://example.com/reset-password</p>
    </div>
</body>
</html>
